<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" font-family="'IBM Plex Mono', ui-monospace, monospace">
  <defs>
    <g id="tabseal">
      <path d="M46 80 v-16 a8 8 0 0 1 8 -8 h30 l14 14 h48 a8 8 0 0 1 8 8 v52 a10 10 0 0 1 -10 10 h-88 a10 10 0 0 1 -10 -10 z"
            fill="none" stroke="currentColor" stroke-width="9" stroke-linejoin="round"/>
      <circle cx="100" cy="106" r="17" fill="currentColor"/>
    </g>
  </defs>

  <!-- Paper artboard -->
  <rect width="960" height="540" fill="#F2F1EC"/>

  <!-- Header -->
  <text x="60" y="58" font-size="13" letter-spacing="2" fill="#1B1F1D" font-weight="600">WHOLECLAIM LOGO SYSTEM — CONCEPT SHEET v0.1</text>
  <text x="60" y="80" font-size="11" fill="#6E7069">THE TAB SEAL: THE FOLDER IS THE FILE. THE FULL CIRCLE IS THE WHOLE.</text>
  <line x1="60" y1="94" x2="900" y2="94" stroke="#D7D4CA" stroke-width="1"/>

  <!-- App icon -->
  <rect x="60" y="122" width="200" height="200" rx="44" fill="#1E4B3C"/>
  <use href="#tabseal" x="60" y="122" color="#F2F1EC"/>
  <text x="60" y="348" font-size="10" letter-spacing="1.5" fill="#6E7069">APP ICON — 512 GRID · LEDGER GREEN #1E4B3C</text>

  <!-- Primary lockup -->
  <text x="330" y="150" font-size="10" letter-spacing="1.5" fill="#6E7069">PRIMARY LOCKUP</text>
  <text x="326" y="212" font-size="58" font-weight="800" letter-spacing="4"
        font-family="Archivo,'Arial Black','Helvetica Neue',Arial,sans-serif">
    <tspan fill="#1B1F1D">WHOLE</tspan><tspan fill="#1E4B3C">CLAIM</tspan>
  </text>
  <text x="330" y="242" font-size="15" letter-spacing="0.5" fill="#6E7069"
        font-family="'Public Sans','Helvetica Neue',Arial,sans-serif">The homeowner's claim documentation platform.</text>

  <!-- Horizontal lockup -->
  <text x="330" y="286" font-size="10" letter-spacing="1.5" fill="#6E7069">HORIZONTAL LOCKUP</text>
  <rect x="330" y="298" width="48" height="48" rx="11" fill="#1E4B3C"/>
  <use href="#tabseal" transform="translate(330,298) scale(0.24)" color="#F2F1EC"/>
  <text x="392" y="332" font-size="26" font-weight="800" letter-spacing="2"
        font-family="Archivo,'Arial Black','Helvetica Neue',Arial,sans-serif">
    <tspan fill="#1B1F1D">WHOLE</tspan><tspan fill="#1E4B3C">CLAIM</tspan>
  </text>

  <!-- Variants -->
  <text x="60" y="392" font-size="10" letter-spacing="1.5" fill="#6E7069">VARIANTS</text>
  <rect x="60" y="404" width="88" height="88" rx="19" fill="#FBFAF7" stroke="#D7D4CA" stroke-width="1"/>
  <use href="#tabseal" transform="translate(60,404) scale(0.44)" color="#1E4B3C"/>
  <text x="60" y="508" font-size="9" letter-spacing="1" fill="#6E7069">GREEN ON SURFACE</text>

  <rect x="188" y="404" width="88" height="88" rx="19" fill="#1B1F1D"/>
  <use href="#tabseal" transform="translate(188,404) scale(0.44)" color="#F2F1EC"/>
  <text x="188" y="508" font-size="9" letter-spacing="1" fill="#6E7069">REVERSED / DARK</text>

  <rect x="316" y="404" width="88" height="88" rx="19" fill="none" stroke="#1B1F1D" stroke-width="2"/>
  <use href="#tabseal" transform="translate(316,404) scale(0.44)" color="#1B1F1D"/>
  <text x="316" y="508" font-size="9" letter-spacing="1" fill="#6E7069">MONO INK</text>

  <!-- Rules -->
  <text x="470" y="418" font-size="11" fill="#1B1F1D" font-weight="600" letter-spacing="1">RULES</text>
  <text x="470" y="438" font-size="11" fill="#6E7069">CLEARSPACE = TAB HEIGHT · MIN ICON 24PX · MIN LOCKUP 90PX</text>
  <text x="470" y="456" font-size="11" fill="#6E7069">NO GRADIENTS · NO ROTATION · NEVER ON STAMP RED #A32C1C</text>
  <text x="470" y="474" font-size="11" fill="#6E7069">CIRCLE STAYS A CIRCLE — NEVER A CHECKMARK</text>

  <!-- Footer -->
  <line x1="60" y1="520" x2="900" y2="520" stroke="#D7D4CA" stroke-width="1"/>
  <text x="60" y="534" font-size="9" letter-spacing="1" fill="#6E7069">STATUS: CONCEPT — PENDING NAME CLEARANCE · FINAL VECTORS BY DESIGNER · PREVIEW FONTS MAY FALL BACK</text>
</svg>
